<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shows Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Calendar</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="calendar.html">Shows</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="events">
      <h2>Shows Calendar</h2>
      <div id="calendar-header" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem;"></div>
      <div id="calendar-grid" class="calendar-grid">
        <!-- Weekday headers -->
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
    </section>
  </main>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSNK85vBRrlhWYpPQF04sDO-1G7n_3IKzOWuOidRwWNeR4eMQrRTclZBRxRctRT4yFXVdbkFYf3oH9_/pub?output=csv';

    async function generateCalendar() {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();
      const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];
    const calendarHeader = document.getElementById('calendar-header');
    calendarHeader.textContent = `${monthNames[month]} ${year}`;


      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const calendarGrid = document.getElementById('calendar-grid');

       // Clear previous cells (except weekday headers)
    calendarGrid.querySelectorAll('.calendar-cell, .empty').forEach(el => el.remove());

      // Add blank cells for first row padding
      for (let i = 0; i < 7 + firstDay; i++) {
        if (i < 7) continue; // Skip weekday headers
        const cell = document.createElement('div');
        if (i < 7 + firstDay) cell.classList.add('empty');
        calendarGrid.appendChild(cell);
      }

      // Fetch CSV data
      const response = await fetch(csvUrl);
      const text = await response.text();
      const rows = text.trim().split('\n').slice(1);
      const eventsByDate = {};

      // Parse CSV rows into event objects
      rows.forEach(row => {
        const [dateStr, title, location] = row.split(',');
        const eventDate = new Date(dateStr);
        const key = eventDate.toISOString().split('T')[0]; // YYYY-MM-DD
        if (!eventsByDate[key]) eventsByDate[key] = [];
        eventsByDate[key].push({ title, location });
      });

      // Add each day of the current month
      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.classList.add('calendar-cell');

        const date = new Date(year, month, day);
        const key = date.toISOString().split('T')[0];

        cell.innerHTML = `<strong>${day}</strong>`;
        if (eventsByDate[key]) {
          eventsByDate[key].forEach(event => {
            const eventDiv = document.createElement('div');
            eventDiv.classList.add('event');
            eventDiv.innerHTML = `<span>${event.title}</span><br><em>${event.location}</em>`;
            cell.appendChild(eventDiv);
          });
        }

        calendarGrid.appendChild(cell);
      }
    }

    
    generateCalendar();
  </script>
</body>
</html>
