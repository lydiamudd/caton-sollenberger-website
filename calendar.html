<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calendar with ICS Import</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #211a1d;
      color: #f8f0fb;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #E9DF00;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 900px;
      margin: 0 auto;
      text-align: left;
      color: #000;
      background-color: #f8f0fb;
      padding: 20px;
      border-radius: 10px;
    }

    .calendar-grid > div {
      background: #fff;
      border: 1px solid #ccc;
      min-height: 100px;
      padding: 5px;
      border-radius: 5px;
      font-size: 14px;
      position: relative;
    }

    .calendar-grid .weekday {
      background-color: #211a1d;
      font-weight: bold;
      color: #E9DF00;
      text-align: center;
    }

    .event {
      font-size: 12px;
      margin-top: 5px;
      padding: 3px;
      border-top: 1px dotted #ccc;
    }

    strong {
      display: block;
      margin-bottom: 5px;
      color: #8075FF;
    }
  </style>
</head>
<body>
  <h1>My Calendar</h1>
  <div class="calendar-grid" id="calendar"></div>

  <!-- Include ical.js from CDN -->
  <script src="https://unpkg.com/ical.js/build/ical.min.js"></script>

  <script>
    const calendarContainer = document.getElementById('calendar');
    const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const ICS_URL = 'https://p118-caldav.icloud.com/published/2/NTI0OTUwOTM3NTI0OTUwORo0a-wmI95-JRdLXFzjojgHpn5GFmjqXPMGkucAEnJB'; // Replace this with your real .ics URL

    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();

    // Render weekday headers
    weekdays.forEach(day => {
      const cell = document.createElement('div');
      cell.textContent = day;
      cell.className = 'weekday';
      calendarContainer.appendChild(cell);
    });

    function renderMonth(year, month, events) {
      // First day of the month
      const firstDay = new Date(year, month, 1);
      const startDay = firstDay.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Add empty cells before first day
      for (let i = 0; i < startDay; i++) {
        const empty = document.createElement('div');
        calendarContainer.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const cell = document.createElement('div');
        cell.innerHTML = `<strong>${day}</strong>`;

        if (events[dateKey]) {
          events[dateKey].forEach(evt => {
            const evtDiv = document.createElement('div');
            evtDiv.className = 'event';
            evtDiv.textContent = evt;
            cell.appendChild(evtDiv);
          });
        }

        calendarContainer.appendChild(cell);
      }
    }

    // Parse ICS and extract events
    async function loadICS() {
      try {
        const response = await fetch(ICS_URL);
        const icsText = await response.text();
        const jcalData = ICAL.parse(icsText);
        const comp = new ICAL.Component(jcalData);
        const vevents = comp.getAllSubcomponents('vevent');

        const events = {};

        vevents.forEach(vevent => {
          const evt = new ICAL.Event(vevent);
          const startDate = evt.startDate.toJSDate();
          const dateKey = `${startDate.getFullYear()}-${String(startDate.getMonth() + 1).padStart(2, '0')}-${String(startDate.getDate()).padStart(2, '0')}`;

          if (!events[dateKey]) events[dateKey] = [];
          events[dateKey].push(evt.summary);
        });

        renderMonth(currentYear, currentMonth, events);

      } catch (err) {
        console.error('Failed to load ICS:', err);
        calendarContainer.innerHTML = '<p style="color:red;">Failed to load calendar events.</p>';
      }
    }

    loadICS();
  </script>
</body>
</html>
