<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shows Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Calendar</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="calendar.html">Calendar</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="events">
      <!-- <h2>Shows Calendar</h2> -->
      <div id="calendar-controls" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
        <button id="prev-month" class="calendar-button">←</button>
        <div id="calendar-header" style="font-size: 1.5rem; font-weight: bold;"></div>
        <button id="next-month" class="calendar-button">→</button>
    </div>
            <div id="calendar-grid" class="calendar-grid">
        <!-- Weekday headers -->
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>        
      </div>
    </section>
  </main>

  <script>
    const icsUrl = 'https://p118-caldav.icloud.com/published/2/NTI0OTUwOTM3NTI0OTUwORo0a-wmI95-JRdLXFzjojgHpn5GFmjqXPMGkucAEnJB';
  
    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];
  
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
  
    async function fetchICS(url) {
      const response = await fetch(url);
      const text = await response.text();
      return parseICS(text);
    }
  
    function parseICS(data) {
      const events = [];
      const regex = /BEGIN:VEVENT([\s\S]*?)END:VEVENT/g;
      let match;
      while ((match = regex.exec(data)) !== null) {
        const eventBlock = match[1];
        const summary = eventBlock.match(/SUMMARY:(.*)/)?.[1]?.trim();
        const location = eventBlock.match(/LOCATION:(.*)/)?.[1]?.trim();
        const dtstart = eventBlock.match(/DTSTART(?:;[^:]+)?:([^\n\r]+)/)?.[1]?.trim();
  
        if (summary && dtstart) {
          const date = formatICSToDate(dtstart);
          events.push({ date, title: summary, location: location || '' });
        }
      }
      return events;
    }
  
    function formatICSToDate(icsDateStr) {
      // Handle formats like "20250614" or "20250614T193000Z"
      const year = icsDateStr.substring(0, 4);
      const month = icsDateStr.substring(4, 6) - 1; // zero-based
      const day = icsDateStr.substring(6, 8);
      return new Date(year, month, day);
    }
  
    async function generateCalendar(month = currentMonth, year = currentYear) {
      const calendarHeader = document.getElementById('calendar-header');
      const calendarGrid = document.getElementById('calendar-grid');
  
      calendarHeader.textContent = `${monthNames[month]} ${year}`;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
  
      // Clear previous cells (except weekday headers)
      calendarGrid.querySelectorAll('.calendar-cell, .empty').forEach(el => el.remove());
  
      // Add blank cells before the first day
      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.classList.add('empty');
        calendarGrid.appendChild(cell);
    }

  
      const events = await fetchICS(icsUrl);
      const eventsByDate = {};
      events.forEach(event => {
        const key = event.date.toISOString().split('T')[0];
        if (!eventsByDate[key]) eventsByDate[key] = [];
        eventsByDate[key].push(event);
      });
  
      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.classList.add('calendar-cell');
        const date = new Date(year, month, day);
        const key = date.toISOString().split('T')[0];
  
        cell.innerHTML = `<strong>${day}</strong>`;
        if (eventsByDate[key]) {
          eventsByDate[key].forEach(event => {
            const eventDiv = document.createElement('div');
            eventDiv.classList.add('event');
            eventDiv.innerHTML = `<span>${event.title}</span><br><em>${event.location}</em>`;
            cell.appendChild(eventDiv);
          });
        }
  
        calendarGrid.appendChild(cell);
      }
    }
  
    // Navigation buttons
    document.getElementById('prev-month').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      generateCalendar(currentMonth, currentYear);
    });
  
    document.getElementById('next-month').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    });
  
    // Initial render
    generateCalendar();
  </script>
