<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICS Calendar</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .popup {
      position: absolute;
      background-color: #211a1d;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      padding: 1rem;
      z-index: 1000;
      max-width: 250px;
      font-size: 0.9rem;
    }
    .popup h3 {
      margin-top: 0;
      font-size: 1rem;
    }
    .calendar-button {
      padding: 0.25rem 0.75rem;
      font-size: 1rem;
    }
    #view-toggle button {
      padding: 0.5rem 1rem;
      margin-right: 0.5rem;
      font-size: 1rem;
      border: none;
      background-color: #ddd;
      cursor: pointer;
      border-radius: 0.5rem 0.5rem 0 0;
    }
    #view-toggle button.active {
      background-color: #bbb;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    th, td {
      padding: 0.5rem;
      border: 1px solid #ccc;
      text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
    .weekday {
      font-weight: bold;
      text-align: center;
      padding: 0.5rem;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.25rem;
    }
    .calendar-cell {
      min-height: 80px;
      border: 1px solid #ccc;
      padding: 0.25rem;
    }
    .event {
      background: #eee;
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Upcoming Shows</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="calendar-ics.html">Upcoming Shows</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="events">

        <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem;">
            <div>
              <p style="margin-bottom: 0.5rem; font-size: 1.1rem;">
                View Caton's upcoming shows in calendar or table format:
              </p>
              <div id="view-toggle">
                <button id="btn-calendar" class="active" onclick="toggleView('calendar')">🗓️ Calendar View</button>
                <button id="btn-table" onclick="toggleView('table')">📋 Table View</button>
              </div>
            </div>
        </div>
                    

      <!-- Calendar View -->
      <div id="calendar-view">
        <div id="calendar-controls" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
          <button id="prev-month" class="calendar-button">←</button>
          <div id="calendar-header" style="font-size: 1.5rem; font-weight: bold;"></div>
          <button id="next-month" class="calendar-button">→</button>
        </div>

        <div id="calendar-grid" class="calendar-grid">
          <div class="weekday">Sun</div>
          <div class="weekday">Mon</div>
          <div class="weekday">Tue</div>
          <div class="weekday">Wed</div>
          <div class="weekday">Thu</div>
          <div class="weekday">Fri</div>
          <div class="weekday">Sat</div>
        </div>
      </div>

      <!-- Table View -->
      <div id="table-view" style="display: none;">
        <table id="events-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Event</th>
              <th>Location</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.min.js"></script>

  <script>
    const ICS_URL = 'https://corsproxy.io/?https://p118-caldav.icloud.com/published/2/NTI0OTUwOTM3NTI0OTUwORo0a-wmI95-JRdLXFzjojifxeSQ6Ew_rOm_nbJdMtZombSywkn2ZyAFT9Bmv9iryydRTANGQNousV8IatZ50OM';

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let allEvents = {};

    async function fetchICSEvents() {
      try {
        const response = await fetch(ICS_URL);
        const text = await response.text();
        const jcalData = ICAL.parse(text);
        const comp = new ICAL.Component(jcalData);
        const vevents = comp.getAllSubcomponents('vevent');

        const events = {};

        vevents.forEach(vevent => {
          const evt = new ICAL.Event(vevent);
          const startDate = evt.startDate.toJSDate();
          const key = startDate.toISOString().split('T')[0];

          const timeOptions = { hour: 'numeric', minute: '2-digit' };
          const startTime = startDate.toLocaleTimeString([], timeOptions);

          let location = evt.location || "";
          location = location.replace(", United States", "").trim();

          if (!events[key]) events[key] = [];
          events[key].push({
            summary: evt.summary,
            location,
            startTime,
            description: vevent.getFirstPropertyValue('description') || "",
            url: vevent.getFirstPropertyValue('url') || ""
          });
        });

        allEvents = events;
        generateCalendar(currentMonth, currentYear);
        populateTable(events);
      } catch (err) {
        console.error('Failed to load ICS:', err);
        document.getElementById('calendar-grid').innerHTML += '<p style="color:red;">Failed to load calendar events.</p>';
      }
    }

    function generateCalendar(month, year) {
      const calendarHeader = document.getElementById('calendar-header');
      const calendarGrid = document.getElementById('calendar-grid');

      calendarHeader.textContent = `${monthNames[month]} ${year}`;

      calendarGrid.querySelectorAll('.calendar-cell, .empty').forEach(el => el.remove());
      removePopup();

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.classList.add('empty');
        calendarGrid.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.classList.add('calendar-cell');

        const date = new Date(year, month, day);
        const key = date.toISOString().split('T')[0];

        cell.innerHTML = `<strong>${day}</strong>`;

        if (allEvents[key]) {
          allEvents[key].forEach(event => {
            const eventDiv = document.createElement('div');
            eventDiv.classList.add('event');
            eventDiv.innerHTML = `<span>${event.startTime}</span>`; // Just time
            eventDiv.style.cursor = "pointer";
            eventDiv.addEventListener("click", (e) => {
              e.stopPropagation();
              showEventPopup(event, e);
            });
            cell.appendChild(eventDiv);
          });
        }

        calendarGrid.appendChild(cell);
      }
    }

    function showEventPopup(event) {
      document.querySelectorAll(".popup, .popup-overlay").forEach(el => el.remove());

      const overlay = document.createElement("div");
      overlay.className = "popup-overlay";
      overlay.addEventListener("click", () => {
        overlay.remove();
        popup.remove();
      });

      const popup = document.createElement("div");
      popup.className = "popup";

      const closeBtn = document.createElement("span");
      closeBtn.className = "popup-close";
      closeBtn.innerHTML = "&times;";
      closeBtn.addEventListener("click", () => {
        popup.remove();
        overlay.remove();
      });

      popup.appendChild(closeBtn);

      popup.innerHTML += `
        <h3>${event.summary}</h3>
        <p><strong>Time:</strong> ${event.startTime}</p>
        ${event.location ? `<p><strong>Location:</strong> ${event.location}</p>` : ""}
        ${event.description ? `<p><strong>Notes:</strong><br>${event.description}</p>` : ""}
        ${event.url ? `<p><a href="${event.url}" target="_blank">More info</a></p>` : ""}
      `;

      document.body.appendChild(overlay);
      document.body.appendChild(popup);
    }

    function removePopup() {
      document.querySelectorAll(".popup").forEach(p => p.remove());
    }

    document.addEventListener("click", removePopup);

    document.getElementById('prev-month').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      generateCalendar(currentMonth, currentYear);
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    });

    function toggleView(view) {
      document.getElementById('calendar-view').style.display = view === 'calendar' ? 'block' : 'none';
      document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';

      document.getElementById('btn-calendar').classList.toggle('active', view === 'calendar');
      document.getElementById('btn-table').classList.toggle('active', view === 'table');
    }

    function populateTable(eventsByDate) {
      const tbody = document.querySelector("#events-table tbody");
      tbody.innerHTML = "";

      const sortedDates = Object.keys(eventsByDate).sort();

      sortedDates.forEach(date => {
        eventsByDate[date].forEach(event => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${date}</td>
            <td>${event.startTime}</td>
            <td>${event.summary}</td>
            <td>${event.location || ""}</td>
            <td>${event.description || ""}</td>
          `;
          tbody.appendChild(row);
        });
      });
    }

    fetchICSEvents();
  </script>
</body>
</html>
