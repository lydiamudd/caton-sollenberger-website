<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICS Calendar</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #211a1d;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      padding: 1rem;
      z-index: 1001;
      max-width: 90%;
      width: 300px;
      font-size: 0.9rem;
      color: white;
    }
  
    .popup h3 {
      margin-top: 0;
      font-size: 1rem;
    }
  
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
    }
  
    .popup-close {
      position: absolute;
      top: 0.25rem;
      right: 0.5rem;
      cursor: pointer;
      font-size: 1.25rem;
      color: white;
    }
  
    @media (max-width: 600px) {
      .popup {
        width: 90%;
        font-size: 1rem;
      }
    }

    .event span {
  display: inline-block;
  font-size: 0.75rem;
  color: white;
  background: #5c3c45;
  padding: 2px 6px;
  border-radius: 0.3rem;
  margin-top: 2px;
}

  </style>
  
</head>
<body>
  <header>
    <h1>Calendar</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="calendar-ics.html">Calendar</a></li>
        <li><a href="tech.html">Tech</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="events">
      <div id="calendar-controls" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
        <button id="prev-month" class="calendar-button">←</button>
        <div id="calendar-header" style="font-size: 1.5rem; font-weight: bold;"></div>
        <button id="next-month" class="calendar-button">→</button>
      </div>

      <div id="calendar-grid" class="calendar-grid">
        <!-- Weekday headers (these stay in place) -->
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.min.js"></script>

  <script>
    const ICS_URL = 'https://corsproxy.io/?https://p118-caldav.icloud.com/published/2/NTI0OTUwOTM3NTI0OTUwORo0a-wmI95-JRdLXFzjojifxeSQ6Ew_rOm_nbJdMtZombSywkn2ZyAFT9Bmv9iryydRTANGQNousV8IatZ50OM';
    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let allEvents = {};

    async function fetchICSEvents() {
      try {
        const response = await fetch(ICS_URL);
        const text = await response.text();
        const jcalData = ICAL.parse(text);
        const comp = new ICAL.Component(jcalData);
        const vevents = comp.getAllSubcomponents('vevent');

        const events = {};

        vevents.forEach(vevent => {
          const evt = new ICAL.Event(vevent);
          const startDate = evt.startDate.toJSDate();
          const key = startDate.toISOString().split('T')[0];

          const timeOptions = { hour: 'numeric', minute: '2-digit' };
          const startTime = startDate.toLocaleTimeString([], timeOptions);

          let location = evt.location || "";
          location = location.replace(", United States", "").trim();

          if (!events[key]) events[key] = [];
          events[key].push({
            summary: evt.summary,
            location,
            startTime,
            description: vevent.getFirstPropertyValue('description') || "",
            url: vevent.getFirstPropertyValue('url') || ""
          });
        });

        allEvents = events;
        generateCalendar(currentMonth, currentYear);
      } catch (err) {
        console.error('Failed to load ICS:', err);
        document.getElementById('calendar-grid').innerHTML += '<p style="color:red;">Failed to load calendar events.</p>';
      }
    }

    function generateCalendar(month, year) {
      const calendarHeader = document.getElementById('calendar-header');
      const calendarGrid = document.getElementById('calendar-grid');

      calendarHeader.textContent = `${monthNames[month]} ${year}`;

      calendarGrid.querySelectorAll('.calendar-cell, .empty').forEach(el => el.remove());
      removePopup();

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.classList.add('empty');
        calendarGrid.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.classList.add('calendar-cell');

        const date = new Date(year, month, day);
        const key = date.toISOString().split('T')[0];

        cell.innerHTML = `<strong>${day}</strong>`;

        if (allEvents[key]) {
          allEvents[key].forEach(event => {
            const eventDiv = document.createElement('div');
            eventDiv.classList.add('event');
            eventDiv.innerHTML = `<span>${event.startTime}</span>`;
            eventDiv.style.cursor = "pointer";
            eventDiv.addEventListener("click", (e) => {
              e.stopPropagation();
              showEventPopup(event);
            });
            cell.appendChild(eventDiv);
          });
        }

        calendarGrid.appendChild(cell);
      }
    }

    function showEventPopup(event) {
    // Remove any existing popup and overlay
    document.querySelectorAll(".popup, .popup-overlay").forEach(el => el.remove());

    const overlay = document.createElement("div");
    overlay.className = "popup-overlay";
    overlay.addEventListener("click", () => {
        overlay.remove();
        popup.remove();
    });

    const popup = document.createElement("div");
    popup.className = "popup";

    const closeBtn = document.createElement("span");
    closeBtn.className = "popup-close";
    closeBtn.innerHTML = "&times;";
    closeBtn.addEventListener("click", () => {
        popup.remove();
        overlay.remove();
    });

    popup.appendChild(closeBtn);

    popup.innerHTML += `
        <h3>${event.summary}</h3>
        <p><strong>Time:</strong> ${event.startTime}</p>
        ${event.location ? `<p><strong>Location:</strong> ${event.location}</p>` : ""}
        ${event.description ? `<p><strong>Notes:</strong><br>${event.description}</p>` : ""}
        ${event.url ? `<p><a href="${event.url}" target="_blank">More info</a></p>` : ""}
    `;

    document.body.appendChild(overlay);
    document.body.appendChild(popup);
    }


    function removePopup() {
      document.querySelectorAll(".popup").forEach(p => p.remove());
    }

    document.addEventListener("click", removePopup);

    document.getElementById('prev-month').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      generateCalendar(currentMonth, currentYear);
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    });

    fetchICSEvents();
  </script>
</body>
</html>
